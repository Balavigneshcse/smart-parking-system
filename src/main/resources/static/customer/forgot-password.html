<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password · SmartPark</title>
<link rel="stylesheet" href="/css/main.css">
</head><body>
<div class="bg-mesh"></div>
<div class="auth-page" style="padding:30px 20px">
  <div class="auth-card animate-slide-up" style="max-width:440px">
    <div class="auth-logo">
      <a href="/"><div class="logo-icon">P</div></a>
      <h2 id="page-title">Forgot Password</h2>
      <p id="page-sub">Enter your email to receive an OTP</p>
    </div>
    <div id="alert-area"></div>
    <div id="step-email">
      <div class="form-group"><label class="form-label">Email *</label>
        <input id="fp-email" type="email" class="form-control" placeholder="you@example.com"></div>
      <button id="send-otp-btn" class="btn btn-primary" style="width:100%;justify-content:center">
        <span id="so-text">Send OTP</span><span id="so-spin" style="display:none" class="spinner"></span></button>
      <div class="auth-footer" style="margin-top:16px"><a href="/customer/login.html" style="color:var(--text3)"><span class="mi" style="font-size:1em">arrow_back</span> Back to Login</a></div>
    </div>
    <div id="step-otp" style="display:none">
      <div class="alert alert-info" style="margin-bottom:14px">OTP sent to <strong id="display-email"></strong>. Valid 10 min.</div>
      <div class="form-group"><label class="form-label">6-digit OTP *</label>
        <input id="otp-input" class="form-control" placeholder="000000" maxlength="6" style="font-family:monospace;letter-spacing:6px;font-size:1.3rem;text-align:center"></div>
      <div style="text-align:center;color:var(--text3);font-size:.82rem;margin-bottom:12px">Expires: <span id="timer" style="color:var(--amber);font-weight:700">10:00</span></div>
      <button id="verify-otp-btn" class="btn btn-primary" style="width:100%;justify-content:center">
        <span id="vo-text">Verify OTP</span><span id="vo-spin" style="display:none" class="spinner"></span></button>
      <div style="text-align:center;margin-top:10px"><a href="#" onclick="resendOtp()" style="color:var(--accent);font-size:.85rem">Resend OTP</a></div>
    </div>
    <div id="step-reset" style="display:none">
      <div class="form-group"><label class="form-label">New Password *</label>
        <input id="new-pass" type="password" class="form-control" placeholder="Min 8 chars">
        <div class="strength-bar" id="str-bar"><span></span><span></span><span></span><span></span></div></div>
      <div class="form-group"><label class="form-label">Confirm *</label>
        <input id="confirm-pass" type="password" class="form-control" placeholder="Repeat"></div>
      <button id="reset-btn" class="btn btn-primary" style="width:100%;justify-content:center">
        <span id="rp-text">Reset Password</span><span id="rp-spin" style="display:none" class="spinner"></span></button>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  let userEmail='',verifiedOtp='',timerInterval=null;
  function showAlert(m,t='danger'){document.getElementById('alert-area').innerHTML=`<div class="alert alert-${t}">${m}</div>`;}
  document.getElementById('send-otp-btn').addEventListener('click',async()=>{
    const email=document.getElementById('fp-email').value.trim();if(!email){showAlert('Enter email.');return;}
    document.getElementById('so-text').style.display='none';document.getElementById('so-spin').style.display='';document.getElementById('send-otp-btn').disabled=true;
    try{await API.post('/auth/forgot-password',{email},false);userEmail=email;document.getElementById('display-email').textContent=email;document.getElementById('step-email').style.display='none';document.getElementById('step-otp').style.display='block';document.getElementById('page-title').textContent='Verify OTP';startTimer(600);}
    catch(e){showAlert(e.message);}finally{document.getElementById('so-text').style.display='';document.getElementById('so-spin').style.display='none';document.getElementById('send-otp-btn').disabled=false;}
  });
  document.getElementById('verify-otp-btn').addEventListener('click',async()=>{
    const otp=document.getElementById('otp-input').value.trim();if(otp.length!==6){showAlert('Enter 6-digit OTP.');return;}
    document.getElementById('vo-text').style.display='none';document.getElementById('vo-spin').style.display='';document.getElementById('verify-otp-btn').disabled=true;
    try{await API.post('/auth/verify-otp',{email:userEmail,otp},false);verifiedOtp=otp;clearInterval(timerInterval);document.getElementById('step-otp').style.display='none';document.getElementById('step-reset').style.display='block';document.getElementById('page-title').textContent='New Password';document.getElementById('alert-area').innerHTML='';}
    catch(e){showAlert(e.message);}finally{document.getElementById('vo-text').style.display='';document.getElementById('vo-spin').style.display='none';document.getElementById('verify-otp-btn').disabled=false;}
  });
  document.getElementById('new-pass').addEventListener('input',()=>{const p=document.getElementById('new-pass').value;let s=0;if(p.length>=8)s++;if(/[A-Z]/.test(p)&&/[a-z]/.test(p))s++;if(/\d/.test(p))s++;if(/[@$!%*?&#]/.test(p))s++;document.getElementById('str-bar').className='strength-bar '+['','weak','fair','good','strong'][s];});
  document.getElementById('reset-btn').addEventListener('click',async()=>{
    const np=document.getElementById('new-pass').value,cp=document.getElementById('confirm-pass').value;
    if(!np){showAlert('Enter password.');return;}if(np!==cp){showAlert('Passwords do not match.');return;}
    document.getElementById('rp-text').style.display='none';document.getElementById('rp-spin').style.display='';document.getElementById('reset-btn').disabled=true;
    try{await API.post('/auth/reset-password',{email:userEmail,otp:verifiedOtp,newPassword:np},false);showAlert('Password reset! Redirecting…','success');setTimeout(()=>window.location.href='/customer/login.html',2000);}
    catch(e){showAlert(e.message);}finally{document.getElementById('rp-text').style.display='';document.getElementById('rp-spin').style.display='none';document.getElementById('reset-btn').disabled=false;}
  });
  async function resendOtp(){try{await API.post('/auth/forgot-password',{email:userEmail},false);startTimer(600);showAlert('OTP resent!','info');}catch(e){showAlert(e.message);}}
  function startTimer(sec){clearInterval(timerInterval);let r=sec;const el=document.getElementById('timer');timerInterval=setInterval(()=>{const m=Math.floor(r/60),s=r%60;el.textContent=`${m}:${String(s).padStart(2,'0')}`;if(--r<0){clearInterval(timerInterval);el.textContent='Expired';}},1000);}
  document.getElementById('otp-input').addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'');});
</script>
</body></html>
