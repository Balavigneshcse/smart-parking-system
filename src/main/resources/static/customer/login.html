<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In · SmartPark</title>
<link rel="stylesheet" href="/css/main.css">
</head><body>
<div class="auth-page">
  <div class="auth-card animate-slide-up">
    <div class="auth-logo">
      <a href="/"><div class="logo-icon">P</div></a>
      <h2>Welcome back</h2>
      <p>Sign in to your SmartPark account</p>
    </div>
    <div id="alert-area"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="email" type="email" class="form-control" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" style="display:flex;justify-content:space-between">
        Password
        <a href="/customer/forgot-password.html" style="font-size:13px;color:var(--ink);text-decoration:underline">Forgot?</a>
      </label>
      <input id="password" type="password" class="form-control" placeholder="••••••••">
    </div>
    <button id="login-btn" class="btn btn-primary" style="width:100%;margin-top:8px">
      <span id="btn-text">Sign In</span>
      <span id="btn-spin" style="display:none" class="spinner"></span>
    </button>
    <div class="auth-footer" style="margin-top:24px">
      New here? <a href="/customer/register.html">Create account</a>
    </div>
    <div class="auth-footer" style="margin-top:12px">
      <a href="/" style="color:var(--shade-50);text-decoration:none"><span class="mi" style="font-size:1em;vertical-align:-3px">arrow_back</span> Back to home</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  if (API.token() && API.role() === 'CUSTOMER') window.location.href = '/customer/dashboard.html';
  const alertArea = document.getElementById('alert-area');
  function showAlert(msg,type='danger'){alertArea.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;}
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    if(!email||!password){showAlert('Please fill all fields.');return;}
    document.getElementById('btn-text').style.display='none';
    document.getElementById('btn-spin').style.display='';
    document.getElementById('login-btn').disabled=true;
    try{
      const data=await API.post('/auth/login',{email,password},false);
      if(data.role!=='CUSTOMER'){showAlert('This portal is for customers only.');return;}
      API.saveAuth(data);
      Toast.success('Welcome back, '+data.name+'!');
      setTimeout(()=>window.location.href='/customer/dashboard.html',600);
    }catch(e){showAlert(e.message);}
    finally{document.getElementById('btn-text').style.display='';document.getElementById('btn-spin').style.display='none';document.getElementById('login-btn').disabled=false;}
  });
  document.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-btn').click();});
  initDemoLogin('CUSTOMER',(email,pass)=>{document.getElementById('email').value=email;document.getElementById('password').value=pass;document.getElementById('login-btn').click();});
</script>
</body></html>
