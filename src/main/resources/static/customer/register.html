<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Account · SmartPark</title>
<link rel="stylesheet" href="/css/main.css">
</head><body>
<div class="bg-mesh"></div>
<div class="auth-page" style="padding:30px 20px">
  <div class="auth-card animate-slide-up" style="max-width:500px">
    <div class="auth-logo">
      <a href="/"><div class="logo-icon">P</div></a>
      <h2>Create Account</h2>
      <p>Join SmartPark — it's free</p>
    </div>
    <div id="alert-area"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Full Name *</label>
        <input id="name" class="form-control" placeholder="Arjun Kumar"></div>
      <div class="form-group"><label class="form-label">Date of Birth *</label>
        <input id="dob" type="date" class="form-control"></div>
    </div>
    <div class="form-group"><label class="form-label">Email *</label>
      <input id="email" type="email" class="form-control" placeholder="you@example.com"></div>
    <div class="form-group"><label class="form-label">Mobile *</label>
      <input id="phone" class="form-control" placeholder="9876543210" maxlength="10">
      <div class="form-hint">10-digit Indian mobile number</div></div>
    <div class="form-group"><label class="form-label">Password *</label>
      <input id="password" type="password" class="form-control" placeholder="Min 8 characters">
      <div class="strength-bar" id="str-bar"><span></span><span></span><span></span><span></span></div>
      <div class="strength-text" id="str-text"></div></div>
    <div class="form-group"><label class="form-label">Confirm Password *</label>
      <input id="confirm" type="password" class="form-control" placeholder="Repeat password"></div>
    <button id="reg-btn" class="btn btn-primary" style="width:100%;justify-content:center">
      <span id="btn-text">Create Account</span>
      <span id="btn-spin" style="display:none" class="spinner"></span>
    </button>
    <div class="auth-footer" style="margin-top:16px">Already have an account? <a href="/customer/login.html">Sign in</a></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  document.getElementById('password').addEventListener('input',()=>{
    const p=document.getElementById('password').value;let s=0;
    if(p.length>=8)s++;if(/[A-Z]/.test(p)&&/[a-z]/.test(p))s++;if(/\d/.test(p))s++;if(/[@$!%*?&#^()_+\-=]/.test(p))s++;
    const levels=['','weak','fair','good','strong'],labels=['','Weak','Fair','Good','Strong'];
    document.getElementById('str-bar').className='strength-bar '+(levels[s]||'');
    document.getElementById('str-text').textContent=labels[s]||'';
  });
  document.getElementById('reg-btn').addEventListener('click',async()=>{
    const name=document.getElementById('name').value.trim(),dob=document.getElementById('dob').value;
    const email=document.getElementById('email').value.trim(),phone=document.getElementById('phone').value.trim();
    const password=document.getElementById('password').value,confirm=document.getElementById('confirm').value;
    const alertArea=document.getElementById('alert-area');
    if(!name||!dob||!email||!phone||!password){alertArea.innerHTML='<div class="alert alert-danger">Please fill all fields.</div>';return;}
    if(password!==confirm){alertArea.innerHTML='<div class="alert alert-danger">Passwords do not match.</div>';return;}
    if(!/^[6-9]\d{9}$/.test(phone)){alertArea.innerHTML='<div class="alert alert-danger">Invalid phone number.</div>';return;}
    document.getElementById('btn-text').style.display='none';document.getElementById('btn-spin').style.display='';document.getElementById('reg-btn').disabled=true;
    try{
      const data=await API.post('/auth/register',{name,email,password,phone,dateOfBirth:dob},false);
      API.saveAuth(data);Toast.success('Account created!');
      setTimeout(()=>window.location.href='/customer/dashboard.html',800);
    }catch(e){alertArea.innerHTML=`<div class="alert alert-danger">${e.message}</div>`;}
    finally{document.getElementById('btn-text').style.display='';document.getElementById('btn-spin').style.display='none';document.getElementById('reg-btn').disabled=false;}
  });
</script>
</body></html>
