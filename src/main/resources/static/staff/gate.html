<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gate Operations · SmartPark</title>
<link rel="stylesheet" href="/css/main.css">
<style>
  .gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:860px){.gate-grid{grid-template-columns:1fr}}
  .session-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .15s}
  .session-row:hover{background:var(--surface2)}
  .session-row .meta{flex:1;font-size:.82rem;color:var(--text3)}
  .tab-bar{display:flex;gap:4px;margin-bottom:12px}
  .tab-btn{padding:7px 14px;border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:var(--transition)}
  .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head><body>
<div class="bg-mesh"></div>
<nav class="navbar">
  <div class="inner">
    <a href="#" class="brand"><div class="brand-icon">P</div><span class="brand-name">Gate Ops</span></a>
    <ul class="nav-links">
      <li><span id="nav-user" style="color:var(--text2);font-size:.85rem"></span></li>
      <li><a href="#" class="logout-btn btn-nav">Logout</a></li>
    </ul>
  </div>
</nav>
<div class="page-wrapper" style="padding:24px 0 60px">
<div class="container" style="max-width:1100px">
  <div class="dash-header animate-fade-down" style="margin-bottom:16px">
    <div><h1 style="font-size:1.4rem">Gate Operations</h1><p style="color:var(--text2);font-size:.85rem" id="place-label">Loading…</p></div>
    <button class="btn btn-ghost btn-sm" onclick="refreshAll()"><span class="mi">refresh</span> Refresh</button>
  </div>
  <div id="global-alert"></div>
  <div class="gate-grid">
    <div>
      <div class="card animate-slide-up" style="margin-bottom:14px">
        <h3 class="card-title" style="margin-bottom:12px">Vehicle Check</h3>
        <div style="display:flex;gap:8px"><input id="plate-input" class="form-control" placeholder="TN09AB1234" style="font-family:monospace;text-transform:uppercase;letter-spacing:2px;flex:1"><button class="btn btn-primary" onclick="checkPlate()">Check</button></div>
        <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:10px" onclick="openScanner()"><span class="mi">qr_code_scanner</span>&nbsp;Scan Gate Pass QR</button>
        <div id="check-result"></div>
      </div>
      <div class="card animate-slide-up">
        <h3 class="card-title" style="margin-bottom:12px">On-Spot Registration</h3>
        <div class="form-row"><div class="form-group"><label class="form-label">Plate *</label><input id="os-plate" class="form-control" style="font-family:monospace;text-transform:uppercase"></div><div class="form-group"><label class="form-label">Type *</label><select id="os-vtype" class="form-control"><option value="CAR">Car</option><option value="BIKE">Bike</option><option value="BUS">Bus</option><option value="TRUCK">Truck</option><option value="VAN">Van</option></select></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">Owner *</label><input id="os-name" class="form-control"></div><div class="form-group"><label class="form-label">Phone *</label><input id="os-phone" class="form-control" maxlength="10"></div></div>
        <div id="onspot-alert"></div>
        <button id="os-btn" class="btn btn-primary" style="width:100%;justify-content:center" onclick="registerOnSpot()"><span id="os-text">Register & Entry</span><span id="os-spin" style="display:none" class="spinner"></span></button>
      </div>
    </div>
    <div>
      <div class="card animate-slide-up" style="padding:0">
        <div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
          <h3 style="font-size:.95rem;font-weight:700;margin:0">Active Sessions <span id="active-count" class="badge badge-green">0</span></h3>
        </div>
        <div style="padding:10px 14px 0"><div class="tab-bar"><button class="tab-btn active" id="tab-active" onclick="switchTab('active')">Live Inside</button><button class="tab-btn" id="tab-today" onclick="switchTab('today')">Today's Log</button></div></div>
        <div id="active-list" style="min-height:180px;padding:0 0 8px"></div>
        <div id="today-list" style="display:none;min-height:180px;padding:0 0 8px"></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- QR Scanner Modal -->
<div class="modal-overlay" id="scan-modal">
  <div class="modal-box" style="max-width:420px">
    <div class="modal-title">Scan Gate Pass</div>
    <div id="scan-status" style="color:var(--shade-50);font-size:14px;margin-bottom:12px">Point the camera at the customer's QR code.</div>
    <video id="scan-video" style="width:100%;border-radius:var(--r-md);background:#000;aspect-ratio:4/3;object-fit:cover"></video>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeScanner()">Cancel</button></div>
  </div>
</div>

<!-- Exit Modal -->
<div class="modal-overlay" id="exit-modal">
  <div class="modal-box"><div class="modal-title">Vehicle Exit</div><div id="exit-modal-body"></div></div>
</div>
<!-- Entry Modal -->
<div class="modal-overlay" id="entry-modal">
  <div class="modal-box" style="max-width:400px"><div class="modal-title">Confirm Entry</div><div id="entry-modal-body"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeEntryModal()">Cancel</button><button id="entry-confirm-btn" class="btn btn-primary"><span id="ec-text">Mark Entry</span><span id="ec-spin" style="display:none" class="spinner"></span></button></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/navbar.js"></script>
<script>
const role=API.role();if(!API.token()||(role!=='MANAGER'&&role!=='SECURITY'))window.location.href='/staff/login.html';
const me=API.user();if(me)document.getElementById('nav-user').textContent=me.name||'';
async function loadPlaceName(){try{const places=await fetch('/api/places').then(r=>r.json());if(me?.placeId){const p=places.find(x=>x.id==me.placeId);if(p)document.getElementById('place-label').textContent=p.name;}}catch(e){}}
loadPlaceName();

function switchTab(w){document.getElementById('active-list').style.display=w==='active'?'':'none';document.getElementById('today-list').style.display=w==='today'?'':'none';document.getElementById('tab-active').className='tab-btn'+(w==='active'?' active':'');document.getElementById('tab-today').className='tab-btn'+(w==='today'?' active':'');if(w==='today')loadToday();}
function refreshAll(){loadActive();loadToday();}

async function loadActive(){const el=document.getElementById('active-list');try{const sessions=await API.get('/gate/sessions/active');document.getElementById('active-count').textContent=sessions.length;if(!sessions.length){el.innerHTML='<div style="text-align:center;padding:32px;color:var(--text3)">No vehicles inside.</div>';return;}
  el.innerHTML=sessions.map(s=>`<div class="session-row"><span class="plate-badge">${fmt.plate(s.plateNumber)}</span><div class="meta"><div>${s.vehicleType} · ${s.ownerName||'—'}</div><div>In: ${s.entryTime} · ${s.spaceName||''}</div></div><button class="btn btn-danger btn-sm" onclick="openExit(${s.id})">Exit</button></div>`).join('');}
  catch(e){el.innerHTML=`<div style="padding:14px"><div class="alert alert-danger">${e.message}</div></div>`;document.getElementById('active-count').textContent='!';}}

async function loadToday(){const el=document.getElementById('today-list');el.innerHTML='<div style="text-align:center;padding:20px"><div class="spinner"></div></div>';try{const sessions=await API.get('/gate/sessions/today');if(!sessions.length){el.innerHTML='<div style="text-align:center;padding:32px;color:var(--text3)">No sessions today.</div>';return;}
  el.innerHTML=sessions.map(s=>`<div class="session-row"><span class="plate-badge">${fmt.plate(s.plateNumber)}</span><div class="meta"><div>${s.vehicleType} · ${s.ownerName||'—'}</div><div>In: ${s.entryTime||'—'} · Out: ${s.exitTime||'Still inside'}</div></div><div style="text-align:right;font-size:.82rem"><div style="color:var(--emerald);font-weight:700">${s.totalFee?fmt.money(s.totalFee):'—'}</div><span class="badge badge-${s.status==='ACTIVE'?'green':'gray'}">${s.status}</span></div>${s.status==='COMPLETED'?`<button class="btn btn-ghost btn-sm" title="Receipt" onclick="gateReceipt(${s.id})"><span class="mi">receipt_long</span></button>`:''}</div>`).join('');}catch(e){el.innerHTML=`<div class="alert alert-danger" style="margin:12px">${e.message}</div>`;}}
async function gateReceipt(id){try{const r=await API.get('/gate/receipt/'+id);downloadReceiptPDF(r);Toast.success('Receipt downloaded');}catch(e){Toast.error(e.message);}}

document.getElementById('plate-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPlate();e.target.value=e.target.value.toUpperCase();});
async function checkPlate(){const plate=document.getElementById('plate-input').value.trim().toUpperCase();if(!plate)return;const el=document.getElementById('check-result');el.innerHTML='<div style="padding:8px;color:var(--text3)">Checking…</div>';
  try{const v=await API.get('/gate/check/'+plate);
    if(!v.found){el.innerHTML=`<div class="alert alert-danger" style="margin-top:10px">Not found. Register below.</div>`;document.getElementById('os-plate').value=plate;return;}
    if(v.hasActiveSession){el.innerHTML=`<div class="alert alert-warning" style="margin-top:10px">${plate} already inside. <button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="openExit(${v.sessionId})">Exit</button></div>`;return;}
    el.innerHTML=`<div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-top:10px;border:1px solid var(--border)">
      <div class="detail-row"><span class="dl">Plate</span><span class="dv" style="font-family:monospace">${fmt.plate(v.plateNumber)}</span></div>
      <div class="detail-row"><span class="dl">Type</span><span class="dv">${v.vehicleType}</span></div>
      <div class="detail-row"><span class="dl">Owner</span><span class="dv">${v.ownerName||'—'}</span></div>
      <div class="detail-row"><span class="dl">Booking</span><span class="dv">${v.hasReservation?'<span class="badge badge-green">Pre-booked ('+v.reservationRef+')</span>':'<span class="badge badge-gray">Walk-in</span>'}</span></div></div>
      <button class="btn btn-primary" style="width:100%;margin-top:10px;justify-content:center" onclick="openEntryModal('${v.plateNumber}','${v.vehicleType}','${v.ownerName||''}',${v.hasReservation})">Mark Entry</button>`;
  }catch(e){el.innerHTML=`<div class="alert alert-danger" style="margin-top:10px">${e.message}</div>`;}}

function openEntryModal(plate,vtype,owner,hasRes){document.getElementById('entry-modal-body').innerHTML=`
  <div class="detail-row"><span class="dl">Plate</span><span class="dv" style="font-family:monospace">${fmt.plate(plate)}</span></div>
  <div class="detail-row"><span class="dl">Type</span><span class="dv">${vtype}</span></div>
  <div class="detail-row"><span class="dl">Owner</span><span class="dv">${owner||'—'}</span></div>
  ${hasRes?'<div class="alert-success-soft" style="margin-top:10px">Pre-booked. Entry linked to reservation.</div>':''}`;
  document.getElementById('entry-confirm-btn').onclick=()=>markEntry(plate);document.getElementById('entry-modal').classList.add('open');}
function closeEntryModal(){document.getElementById('entry-modal').classList.remove('open');}

async function markEntry(plate){document.getElementById('ec-text').style.display='none';document.getElementById('ec-spin').style.display='';document.getElementById('entry-confirm-btn').disabled=true;
  try{await API.post('/gate/entry',{plateNumber:plate});Toast.success('Entry marked for '+plate);closeEntryModal();document.getElementById('check-result').innerHTML='';document.getElementById('plate-input').value='';loadActive();}catch(e){Toast.error(e.message);}
  finally{document.getElementById('ec-text').style.display='';document.getElementById('ec-spin').style.display='none';document.getElementById('entry-confirm-btn').disabled=false;}}

async function registerOnSpot(){const plate=document.getElementById('os-plate').value.trim().toUpperCase(),name=document.getElementById('os-name').value.trim(),phone=document.getElementById('os-phone').value.trim(),vtype=document.getElementById('os-vtype').value;
  if(!plate||!name||!phone){document.getElementById('onspot-alert').innerHTML='<div class="alert alert-danger">Fill all fields.</div>';return;}
  document.getElementById('os-text').style.display='none';document.getElementById('os-spin').style.display='';document.getElementById('os-btn').disabled=true;
  try{await API.post('/gate/entry/on-spot',{plateNumber:plate,vehicleType:vtype,ownerName:name,ownerPhone:phone,ownerEmail:null,spaceId:null});Toast.success('Registered: '+plate);document.getElementById('os-plate').value='';document.getElementById('os-name').value='';document.getElementById('os-phone').value='';document.getElementById('onspot-alert').innerHTML='';loadActive();}
  catch(e){document.getElementById('onspot-alert').innerHTML=`<div class="alert alert-danger">${e.message}</div>`;}
  finally{document.getElementById('os-text').style.display='';document.getElementById('os-spin').style.display='none';document.getElementById('os-btn').disabled=false;}}

let currentSessionId=null;
async function openExit(sessionId){currentSessionId=sessionId;document.getElementById('exit-modal').classList.add('open');document.getElementById('exit-modal-body').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;padding:24px"><div class="spinner spinner-lg"></div><p style="color:var(--text3);margin-top:12px">Loading…</p></div>';
  try{const d=await API.get('/gate/sessions/'+sessionId);renderExitModal(d);}catch(e){document.getElementById('exit-modal-body').innerHTML=`<div class="alert alert-danger">${e.message}</div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeExit()">Close</button></div>`;}}
function closeExit(){document.getElementById('exit-modal').classList.remove('open');currentSessionId=null;}

function renderExitModal(d){const feeStr=fmt.money(d.estimatedFee);
  const details=`<div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;border:1px solid var(--border)">
    <div class="detail-row"><span class="dl">Plate</span><span class="dv" style="font-family:monospace">${fmt.plate(d.plateNumber)}</span></div>
    <div class="detail-row"><span class="dl">Type</span><span class="dv">${d.vehicleType}</span></div>
    <div class="detail-row"><span class="dl">Owner</span><span class="dv">${d.ownerName||'—'}</span></div>
    <div class="detail-row"><span class="dl">Entry</span><span class="dv">${d.entryTime}</span></div>
    ${d.reservationRef?`<div class="detail-row"><span class="dl">Ref</span><span class="dv"><code style="color:var(--accent)">${d.reservationRef}</code></span></div>`:''}</div>`;
  const overtime=d.overtime?'<div class="alert alert-warning">Overtime detected — 2× rate applied.</div>':'';

  if(d.alreadyPaidOnline){document.getElementById('exit-modal-body').innerHTML=`${overtime}${details}<div class="alert-success-soft">Paid online. Just confirm exit.</div><div class="fee-display"><div class="fee-label">Paid</div><div class="fee-amt">${feeStr}</div></div><div id="exit-action-alert"></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeExit()">Cancel</button><button id="do-exit-btn" class="btn btn-success" onclick="doExit('ONLINE_PREPAID')"><span id="exit-btn-text">Confirm Exit</span><span id="exit-btn-spin" style="display:none" class="spinner"></span></button></div>`;return;}

  document.getElementById('exit-modal-body').innerHTML=`${overtime}${details}<div class="fee-display"><div class="fee-label">Collect</div><div class="fee-amt">${feeStr}</div></div>
    <div class="form-group"><label class="form-label">Payment Method *</label><select id="exit-pay-method" class="form-control"><option value="CASH">Cash</option><option value="UPI">UPI</option><option value="CARD">Card</option></select></div>
    <div id="exit-action-alert"></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeExit()">Cancel</button><button id="do-exit-btn" class="btn btn-primary" onclick="doExitWithPayment()"><span id="exit-btn-text">Collect & Exit</span><span id="exit-btn-spin" style="display:none" class="spinner"></span></button></div>`;}

async function doExit(method){const btn=document.getElementById('do-exit-btn'),txt=document.getElementById('exit-btn-text'),spin=document.getElementById('exit-btn-spin');txt.style.display='none';spin.style.display='';btn.disabled=true;
  try{await API.post('/gate/exit/'+currentSessionId,{paymentMethod:method});Toast.success('Exit recorded.');closeExit();loadActive();loadToday();}catch(e){document.getElementById('exit-action-alert').innerHTML=`<div class="alert alert-danger">${e.message}</div>`;}finally{txt.style.display='';spin.style.display='none';btn.disabled=false;}}
function doExitWithPayment(){doExit(document.getElementById('exit-pay-method').value);}

document.getElementById('exit-modal').addEventListener('click',function(e){if(e.target===this)closeExit();});
document.getElementById('entry-modal').addEventListener('click',function(e){if(e.target===this)closeEntryModal();});
document.getElementById('os-plate').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase();});

// ── QR Gate Pass Scanner ─────────────────────────────────────────────────
let scanStream=null, scanLoop=null, barcodeDetector=null;
async function openScanner(){
  const modal=document.getElementById('scan-modal');
  const statusEl=document.getElementById('scan-status');
  const video=document.getElementById('scan-video');
  modal.classList.add('open');
  if(!('BarcodeDetector' in window)){
    statusEl.innerHTML='<span style="color:var(--danger)">This browser can\'t scan in-page. Use Chrome/Edge on Android, or type the reference manually.</span>';
    return;
  }
  try{
    barcodeDetector=new BarcodeDetector({formats:['qr_code']});
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=scanStream; await video.play();
    statusEl.textContent='Scanning…';
    scanLoop=setInterval(async()=>{
      try{
        const codes=await barcodeDetector.detect(video);
        if(codes.length){ onScanned(codes[0].rawValue.trim()); }
      }catch(e){}
    },500);
  }catch(e){
    statusEl.innerHTML='<span style="color:var(--danger)">Camera access denied or unavailable.</span>';
  }
}
function closeScanner(){
  document.getElementById('scan-modal').classList.remove('open');
  if(scanLoop){clearInterval(scanLoop);scanLoop=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
}
async function onScanned(ref){
  if(scanLoop){clearInterval(scanLoop);scanLoop=null;}
  try{
    const v=await API.get('/gate/reservation/'+encodeURIComponent(ref));
    Toast.success('Pass verified: '+ref);
    closeScanner();
    document.getElementById('plate-input').value=v.plateNumber;
    if(v.hasActiveSession){
      document.getElementById('check-result').innerHTML=`<div class="alert alert-warning" style="margin-top:10px">${v.plateNumber} already inside. <button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="openExit(${v.sessionId})">Exit</button></div>`;
      return;
    }
    openEntryModal(v.plateNumber, v.vehicleType, v.ownerName||'', true);
  }catch(e){
    document.getElementById('scan-status').innerHTML=`<span style="color:var(--danger)">${e.message}</span>`;
    setTimeout(()=>{ if(document.getElementById('scan-modal').classList.contains('open')) openScanner(); }, 1500);
  }
}
document.getElementById('scan-modal').addEventListener('click',e=>{if(e.target.id==='scan-modal')closeScanner();});

loadActive();setInterval(loadActive,30000);
</script>
</body></html>
