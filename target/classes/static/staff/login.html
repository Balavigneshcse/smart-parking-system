<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Staff Login · SmartPark</title>
<link rel="stylesheet" href="/css/main.css">
</head><body>
<div class="bg-mesh"></div>
<div class="auth-page">
  <div class="auth-card animate-slide-up">
    <div class="auth-logo">
      <a href="/"><div class="logo-icon">P</div></a>
      <h2>Gate Security</h2>
      <p>Sign in with your staff credentials</p>
    </div>
    <div id="alert-area"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="email" type="email" class="form-control" placeholder="staff@smartparking.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="password" type="password" class="form-control" placeholder="••••••••">
    </div>
    <button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
      <span id="btn-text">Sign In</span>
      <span id="btn-spin" style="display:none" class="spinner"></span>
    </button>
    <div class="auth-footer" style="margin-top:18px">
      <a href="/" style="color:var(--shade-50);font-size:14px"><span class="mi" style="font-size:1em;vertical-align:-3px">arrow_back</span> Back to home</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  const r=API.role();
  if(API.token()&&(r==='SECURITY'||r==='MANAGER'))window.location.href='/staff/gate.html';
  const alertArea=document.getElementById('alert-area');
  function showAlert(m,t='danger'){alertArea.innerHTML=`<div class="alert alert-${t}">${m}</div>`;}
  document.getElementById('login-btn').addEventListener('click',async()=>{
    const email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;
    if(!email||!password){showAlert('Fill all fields.');return;}
    document.getElementById('btn-text').style.display='none';document.getElementById('btn-spin').style.display='';document.getElementById('login-btn').disabled=true;
    try{
      const d=await API.post('/auth/login',{email,password},false);
      if(d.role!=='SECURITY'&&d.role!=='MANAGER'){showAlert('Access denied. Staff credentials required.');return;}
      API.saveAuth(d);Toast.success('Welcome, '+d.name);
      setTimeout(()=>window.location.href='/staff/gate.html',600);
    }catch(e){showAlert(e.message);}
    finally{document.getElementById('btn-text').style.display='';document.getElementById('btn-spin').style.display='none';document.getElementById('login-btn').disabled=false;}
  });
  document.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-btn').click();});
  initDemoLogin('SECURITY',(email,pass)=>{document.getElementById('email').value=email;document.getElementById('password').value=pass;document.getElementById('login-btn').click();});
</script>
</body></html>
