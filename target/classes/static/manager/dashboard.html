<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manager · SmartPark</title>
<link rel="stylesheet" href="/css/main.css">
</head><body>
<div class="bg-mesh"></div>
<div class="dash-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <div class="brand-icon">P</div>
        <div><div class="brand-text">Manager</div><div class="brand-sub" data-user-name></div></div>
      </div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="#" class="active" onclick="showSec('stats')"><span class="nav-icon"><span class="mi">monitoring</span></span>Stats</a></li>
      <li><a href="#" onclick="showSec('res')"><span class="nav-icon"><span class="mi">list_alt</span></span>Reservations</a></li>
      <li><a href="/staff/gate.html"><span class="nav-icon"><span class="mi">boom_gate</span></span>Gate Ops</a></li>
      <li><a href="#" class="logout-btn"><span class="nav-icon"><span class="mi">logout</span></span>Logout</a></li>
    </ul>
  </aside>
  <main class="dash-main">
    <div id="sec-stats">
      <div class="dash-header animate-fade-down"><div><h1>Manager Dashboard</h1><p style="color:var(--text2)">Today's overview</p></div></div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="card-icon amber" style="margin-bottom:8px"><span class="mi">directions_car</span></div><div class="stat-value" id="st-sessions">—</div><div class="stat-label">Sessions Today</div></div>
        <div class="stat-card"><div class="card-icon blue" style="margin-bottom:8px"><span class="mi">list_alt</span></div><div class="stat-value" id="st-res">—</div><div class="stat-label">Reservations</div></div>
        <div class="stat-card"><div class="card-icon green" style="margin-bottom:8px"><span class="mi">payments</span></div><div class="stat-value" id="st-rev">—</div><div class="stat-label">Revenue</div></div>
        <div class="stat-card"><div class="card-icon red" style="margin-bottom:8px"><span class="mi">traffic</span></div><div class="stat-value" id="st-active">—</div><div class="stat-label">Active</div></div>
      </div>
    </div>
    <div id="sec-res" style="display:none">
      <div class="dash-header"><div><h1>Reservations</h1><p style="color:var(--text2)">All bookings at your place</p></div><button class="btn btn-ghost btn-sm" onclick="loadRes()"><span class="mi">refresh</span></button></div>
      <div id="res-table"><div style="display:flex;justify-content:center;padding:40px"><div class="spinner spinner-lg"></div></div></div>
    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<script src="/js/navbar.js"></script>
<script>
  API.requireRole('MANAGER');
  function showSec(s){document.getElementById('sec-stats').style.display=s==='stats'?'':'none';document.getElementById('sec-res').style.display=s==='res'?'':'none';if(s==='res')loadRes();}
  const sc={CONFIRMED:'blue',CHECKED_IN:'green',COMPLETED:'gray',CANCELLED:'red',EXPIRED:'red',PENDING:'amber'};
  async function loadStats(){try{const s=await API.get('/manager/stats');document.getElementById('st-sessions').textContent=s.totalSessionsToday??'—';document.getElementById('st-res').textContent=s.totalReservationsToday??'—';document.getElementById('st-rev').textContent=fmt.money(s.revenueToday);document.getElementById('st-active').textContent=s.activeSessionsNow??'—';}catch(e){Toast.error(e.message);}}
  async function loadRes(){const el=document.getElementById('res-table');el.innerHTML='<div style="display:flex;justify-content:center;padding:40px"><div class="spinner spinner-lg"></div></div>';
    try{const list=await API.get('/manager/reservations');if(!list.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--text3)">No reservations yet.</div>';return;}
      el.innerHTML=`<div class="table-wrap animate-fade-up"><table><thead><tr><th>Ref</th><th>Customer</th><th>Vehicle</th><th>Space</th><th>From</th><th>To</th><th>Fee</th><th>Status</th></tr></thead><tbody>${list.map(r=>`<tr><td><code style="color:var(--accent);font-size:.82rem">${r.reference}</code></td><td>${r.ownerName||'—'}</td><td style="font-family:monospace;font-size:.85rem">${fmt.plate(r.plateNumber)}</td><td>${r.zoneCode||'—'} · ${r.spaceCode||'—'}</td><td style="font-size:.8rem">${r.startsAt}</td><td style="font-size:.8rem">${r.endsAt}</td><td style="color:var(--emerald);font-weight:700">${fmt.money(r.quotedAmount)}</td><td><span class="badge badge-${sc[r.status]||'gray'}">${r.status}</span></td></tr>`).join('')}</tbody></table></div>`;}catch(e){el.innerHTML=`<div class="alert alert-danger">${e.message}</div>`;}}
  loadStats();
</script>
</body></html>
